<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zentia 음성 길찾기</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f52d8;
      --primary-light: #eef2ff;
      --bg: #f8f8fa;
      --card-bg: #ffffff;
      --text: #111111;
      --text-muted: #9ca3af;
      --text-secondary: #6b7280;
      --border: #f0f0f0;
      --border-focus: #6366f1;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.04);
      --shadow-input: 0 -4px 20px rgba(0,0,0,0.06);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Header ──────────────────────────────── */
    .header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 13px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-logo {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-logo svg {
      width: 18px;
      height: 18px;
      color: var(--primary);
    }
    .header-title {
      flex: 1;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 7px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover {
      background: var(--bg);
      color: var(--text);
    }
    .icon-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ─── Tabs ────────────────────────────────── */
    .tab-bar {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      justify-content: center;
    }
    .tab-group {
      display: flex;
      background: var(--bg);
      border-radius: 100px;
      padding: 3px;
      gap: 2px;
    }
    .tab-btn {
      padding: 7px 20px;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 1px 4px rgba(99,102,241,0.25);
    }

    /* ─── Transport toggle ────────────────────── */
    .transport-bar {
      background: var(--card-bg);
      padding: 10px 18px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .transport-btn {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      background: var(--card-bg);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .transport-btn.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }

    /* ─── Panels ──────────────────────────────── */
    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* ─── Chat area ───────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 0; }

    /* ─── Empty state ─────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 12px;
      flex: 1;
    }
    .empty-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .empty-icon svg {
      width: 26px;
      height: 26px;
      color: var(--primary);
    }
    .empty-state h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .empty-state p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .example-chips {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      margin-top: 12px;
      width: 100%;
    }
    .chip {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 9px 4px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
      line-height: 1.3;
    }
    .chip .chip-icon { font-size: 18px; }
    .chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
    }

    /* ─── Message bubbles ─────────────────────── */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: msgIn 0.2s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: 10px 15px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.55;
    }
    .message.user .bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .message.bot .bubble {
      background: var(--card-bg);
      color: var(--text);
      border-bottom-left-radius: 5px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }
    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* ─── Loading dots ────────────────────────── */
    .loading-bubble {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      padding: 14px 18px;
      box-shadow: var(--shadow-sm);
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .dot {
      width: 7px;
      height: 7px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.7;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.7; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ─── Candidate cards ─────────────────────── */
    .candidates-wrapper { width: 100%; max-width: 420px; }
    .candidates-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-left: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .candidate-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 8px;
      transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
      position: relative;
    }
    .candidate-card:hover {
      border-color: #e0e1ff;
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .card-row1 {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .card-num {
      min-width: 22px;
      height: 22px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.2px;
    }
    .card-address {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .card-star {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 17px;
      padding: 4px;
      line-height: 1;
      transition: transform 0.15s ease;
      color: var(--text-muted);
    }
    .card-star:hover { transform: scale(1.25); }
    .card-row2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }
    .card-tags {
      display: flex;
      gap: 5px;
      align-items: center;
      flex-wrap: wrap;
    }
    .card-category {
      background: #f3f4f6;
      color: var(--text-secondary);
      border-radius: 100px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 500;
    }
    .card-distance {
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 100px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 600;
    }
    .card-select-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
      white-space: nowrap;
      letter-spacing: -0.1px;
    }
    .card-select-btn:hover {
      background: var(--primary-dark);
      transform: scale(1.02);
    }
    .card-select-btn:active { transform: scale(0.98); }

    /* ─── Favorites panel ─────────────────────── */
    .fav-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .fav-panel::-webkit-scrollbar { width: 0; }
    .fav-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 60px 20px;
      color: var(--text-secondary);
      text-align: center;
      flex: 1;
    }
    .fav-empty-icon {
      width: 48px;
      height: 48px;
      background: var(--bg);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .fav-empty-icon svg {
      width: 24px;
      height: 24px;
      color: var(--text-muted);
    }
    .fav-empty p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
    }
    .fav-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      transition: box-shadow 0.15s;
    }
    .fav-item:hover { box-shadow: var(--shadow-sm); }
    .fav-row1 {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .fav-pin {
      width: 32px;
      height: 32px;
      background: var(--primary-light);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .fav-pin svg {
      width: 16px;
      height: 16px;
      color: var(--primary);
    }
    .fav-info { flex: 1; min-width: 0; }
    .fav-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 2px;
      letter-spacing: -0.2px;
    }
    .fav-address {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fav-row2 {
      display: flex;
      gap: 6px;
      margin-top: 11px;
    }
    .fav-transit-btn, .fav-car-btn, .fav-delete-btn {
      flex: 1;
      padding: 7px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.15s;
    }
    .fav-transit-btn {
      background: #eff6ff;
      color: #3b82f6;
      border-color: #dbeafe;
    }
    .fav-transit-btn:hover { background: #dbeafe; }
    .fav-car-btn {
      background: #f3f4f6;
      color: var(--text-secondary);
      border-color: #e5e7eb;
    }
    .fav-car-btn:hover { background: #e5e7eb; }
    .fav-delete-btn {
      flex: 0 0 auto;
      padding: 7px 14px;
      background: none;
      color: var(--text-muted);
      border-color: var(--border);
    }
    .fav-delete-btn:hover { background: #fef2f2; color: #ef4444; border-color: #fecaca; }

    /* ─── Quick chips (persistent) ───────────── */
    .quick-chips {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .quick-chips .chip {
      font-size: 11px;
      padding: 7px 2px;
      border-radius: 10px;
    }
    .quick-chips .chip .chip-icon { font-size: 16px; }

    /* ─── Input area ──────────────────────────── */
    .input-area {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 14px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: var(--shadow-input);
    }
    .location-status {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      opacity: 0.7;
    }
    .loc-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
    }
    .loc-dot.ok { background: #22c55e; }
    .loc-dot.err { background: #f87171; }

    /* Mic */
    .mic-row {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .mic-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mic-ring {
      position: absolute;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(99,102,241,0.15);
      opacity: 0;
      transform: scale(1);
      pointer-events: none;
    }
    .mic-btn.recording ~ .mic-ring,
    .mic-btn.recording + .mic-ring {
      animation: none;
    }
    .pulse-ring-1 {
      animation: none;
    }
    .pulse-ring-2 {
      animation: none;
    }
    .recording-active .pulse-ring-1 {
      animation: pulseRing 1.6s ease-out infinite;
    }
    .recording-active .pulse-ring-2 {
      animation: pulseRing 1.6s ease-out 0.5s infinite;
    }
    @keyframes pulseRing {
      0%   { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .mic-btn {
      position: relative;
      z-index: 1;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(145deg, #818cf8, #6366f1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35), 0 2px 4px rgba(99,102,241,0.2);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .mic-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 6px 20px rgba(99,102,241,0.45), 0 2px 6px rgba(99,102,241,0.25);
    }
    .mic-btn:active { transform: scale(0.97); }
    .mic-btn svg {
      width: 26px;
      height: 26px;
      color: #fff;
    }
    .mic-btn.recording {
      background: linear-gradient(145deg, #f87171, #ef4444);
      box-shadow: 0 4px 16px rgba(239,68,68,0.4), 0 2px 4px rgba(239,68,68,0.2);
    }
    .mic-hint {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: -0.1px;
    }
    .mic-hint.recording {
      color: #ef4444;
      font-weight: 600;
    }

    /* Text input row */
    .text-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--bg);
      border-radius: 100px;
      padding: 5px;
      border: 1.5px solid var(--border);
      transition: border-color 0.15s;
    }
    .text-input-row:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
    }
    .text-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      color: var(--text);
    }
    .text-input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 34px;
      height: 34px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.12s;
      flex-shrink: 0;
    }
    .send-btn svg {
      width: 15px;
      height: 15px;
    }
    .send-btn:hover { background: var(--primary-dark); }
    .send-btn:active { transform: scale(0.95); }
    .mic-btn-small {
      width: 34px; height: 34px; flex-shrink: 0;
      background: var(--primary);
      color: #fff; border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s, transform 0.15s;
    }
    .mic-btn-small:hover { background: var(--primary-dark); }
    .mic-btn-small:active { transform: scale(0.95); }
    .mic-btn-small.recording { background: #ef4444; }
    .mic-btn-small svg { width: 16px; height: 16px; }

    /* ─── Config modal ────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card-bg);
      border-radius: var(--radius-xl);
      padding: 26px 24px 22px;
      width: 92%;
      max-width: 400px;
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.04);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .modal-header svg {
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
    }
    .modal h2 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .modal label {
      font-size: 12px;
      font-weight: 600;
      display: block;
      margin-bottom: 7px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .modal input {
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-bottom: 2px solid var(--border);
      background: transparent;
      font-size: 14px;
      margin-bottom: 6px;
      outline: none;
      font-family: inherit;
      color: var(--text);
      transition: border-color 0.15s;
    }
    .modal input:focus { border-bottom-color: var(--primary); }
    .modal-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 22px;
      line-height: 1.55;
    }
    .modal-actions { display: flex; gap: 8px; }
    .btn-secondary {
      flex: 0 0 auto;
      padding: 11px 20px;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      background: var(--card-bg);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .btn-secondary:hover { background: var(--bg); }
    .btn-primary {
      flex: 1;
      padding: 11px 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s, transform 0.12s;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:active { transform: scale(0.98); }

    /* ─── Toast ───────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: #111;
      color: #fff;
      padding: 9px 18px;
      border-radius: 100px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 50;
      pointer-events: none;
      white-space: nowrap;
      max-width: 90vw;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── In-app browser banner ───────────────── */
    .inapp-banner {
      display: none;
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: #fff;
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 16px 18px 24px;
      z-index: 200;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(100%); }
      to   { transform: translateX(-50%) translateY(0); }
    }
    .inapp-banner.show { display: block; }
    .inapp-content {
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px;
    }
    .inapp-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      background: #fef3c7; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #d97706;
    }
    .inapp-icon svg { width: 18px; height: 18px; }
    .inapp-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .inapp-text strong { font-size: 14px; font-weight: 700; color: var(--text); }
    .inapp-text span { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .inapp-close {
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: var(--text-muted); padding: 2px;
      flex-shrink: 0;
    }
    .inapp-actions { display: flex; gap: 8px; }
    .inapp-btn-primary {
      flex: 1; padding: 11px 16px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .inapp-btn-primary:hover { background: var(--primary-dark); }
    .inapp-btn-secondary {

      border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background 0.15s;
    }
    .inapp-btn-secondary:hover { background: var(--border); }
  </style>
</head>

<script>
// ========================
// CONFIG & STATE
// ========================
const CONFIG = {
  webhookUrl: localStorage.getItem('webhookUrl') || 'https://blueblood5.app.n8n.cloud/webhook/map-search',
};

let currentLocation = null;
let currentLocationName = '';  // 동네/건물명 (Naver 쿼리 보강용)
let transportMode = 'transit';
let isRecording = false;
let recognition = null;

// ========================
// GEOLOCATION
// ========================
function initLocation() {
  if (!navigator.geolocation) {
    setLocStatus('위치 서비스 미지원', 'err');
    currentLocation = { lat: 37.5665, lng: 126.9780 };
    return;
  }
  setLocStatus('위치 확인 중...', '');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;
      var acc = Math.round(pos.coords.accuracy);
      currentLocation = { lat: lat, lng: lng };
      setLocStatus('위치 확인됨 (오차 ' + acc + 'm)', 'ok');
      fetchNearbyLandmark(lat, lng);
    },
    function(err) {
      var msgs = {
        1: '위치 권한 거부됨',
        2: '위치를 찾을 수 없음',
        3: '위치 요청 시간 초과'
      };
      setLocStatus((msgs[err.code] || '위치 오류') + ' — 서울시청 기준', 'err');
      currentLocation = { lat: 37.5665, lng: 126.9780 };
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}

function refreshLocation() {
  document.getElementById('locationLandmark').style.display = 'none';
  currentLocation = null;
  initLocation();
}

function fetchNearbyLandmark(lat, lng) {
  fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng + '&format=json&accept-language=ko&zoom=17', {
    headers: { 'Accept-Language': 'ko' }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var a = data.address || {};
    // 표시용: 건물/시설명
    var display = a.amenity || a.shop || a.office || a.building || a.road || a.neighbourhood || a.suburb || '';
    // 쿼리 보강용: 동/구 단위 (Naver 검색에 붙일 지역명)
    var areaName = a.quarter || a.neighbourhood || a.suburb || a.city_district || a.district || a.county || '';
    currentLocationName = areaName;
    if (display) {
      document.getElementById('landmarkText').textContent = display + ' 근처';
      document.getElementById('locationLandmark').style.display = 'block';
    }
  })
  .catch(function() {});
}

function setLocStatus(msg, type) {
  document.getElementById('locStatus').textContent = msg;
  document.getElementById('locDot').className = 'loc-dot' + (type ? ' ' + type : '');
}

// ========================
// TABS
// ========================
function switchTab(tab) {
  document.getElementById('tab-chat').classList.toggle('active', tab === 'chat');
  document.getElementById('tab-fav').classList.toggle('active', tab === 'fav');
  document.getElementById('panel-chat').classList.toggle('active', tab === 'chat');
  document.getElementById('panel-fav').classList.toggle('active', tab === 'fav');
  if (tab === 'fav') renderFavorites();
}

// ========================
// TRANSPORT MODE
// ========================
function setTransport(mode) {
  transportMode = mode;
  document.getElementById('btn-transit').classList.toggle('active', mode === 'transit');
  document.getElementById('btn-car').classList.toggle('active', mode === 'car');
}

// ========================
// SPEECH RECOGNITION
// ========================
function toggleRecording() {
  if (isRecording) { stopRecording(); } else { startRecording(); }
}

function startRecording() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('이 브라우저는 음성 인식을 지원하지 않습니다. 직접 입력해주세요.');
    return;
  }
  recognition = new SR();
  recognition.lang = 'ko-KR';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = function() {
    isRecording = true;
    const stopIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').innerHTML = stopIcon;
    document.getElementById('micWrap').classList.add('recording-active');
    document.getElementById('micHint').textContent = '듣고 있어요... (다시 누르면 중지)';
    document.getElementById('micHint').classList.add('recording');
    var sb = document.getElementById('micBtnSmall');
    if (sb) { sb.classList.add('recording'); sb.innerHTML = stopIcon; }
  };
  recognition.onresult = function(e) { sendText(e.results[0][0].transcript); };
  recognition.onerror = function(e) {
    stopRecording();
    var msgs = { 'not-allowed': '마이크 권한을 허용해주세요.', 'no-speech': '음성이 감지되지 않았습니다.' };
    showToast(msgs[e.error] || '음성 인식 오류: ' + e.error);
  };
  recognition.onend = function() { stopRecording(); };
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  const micIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micBtn').innerHTML = micIcon;
  document.getElementById('micWrap').classList.remove('recording-active');
  document.getElementById('micHint').textContent = '버튼을 누르고 말씀하세요';
  document.getElementById('micHint').classList.remove('recording');
  var sb = document.getElementById('micBtnSmall');
  if (sb) { sb.classList.remove('recording'); sb.innerHTML = micIcon; }
}

// ========================
// SEND TEXT
// ========================
function sendTextFromInput() {
  var input = document.getElementById('textInput');
  var text = input.value.trim();
  if (text) { input.value = ''; sendText(text); }
}

document.getElementById('textInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendTextFromInput();
});

function sendText(text) {
  hideEmptyState();
  addUserMessage(text);

  if (!CONFIG.webhookUrl) {
    addBotMessage('설정이 필요합니다. 오른쪽 상단 설정 버튼을 눌러 n8n Webhook URL을 입력해주세요.');
    showToast('Webhook URL을 설정해주세요.');
    return;
  }

  var loadingId = addLoadingMessage();
  fetch(CONFIG.webhookUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text,
      lat: currentLocation ? currentLocation.lat : 37.5665,
      lng: currentLocation ? currentLocation.lng : 126.9780,
      transportMode,
      locationName: currentLocationName,
    }),
  })
  .then(function(r) {
    if (!r.ok) throw new Error('서버 오류 ' + r.status);
    return r.json();
  })
  .then(function(data) {
    removeMessage(loadingId);
    // n8n이 배열로 감싸서 보내는 경우 처리
    var root = Array.isArray(data) ? data[0] : data;
    var candidates = root.candidates || (Array.isArray(root) ? root : []);
    var mode = root.transportMode || transportMode;
    var dest = root.destination || '';

    if (mode !== transportMode) setTransport(mode);
    if (candidates.length === 0) {
      addBotMessage('검색 결과가 없습니다. 다른 목적지를 말씀해주세요.');
    } else {
      if (dest) addBotMessage('"' + dest + '" 검색 결과예요. (' + (mode === 'transit' ? '대중교통' : '자동차') + ')');
      showCandidates(candidates);
    }
  })
  .catch(function(err) {
    removeMessage(loadingId);
    addBotMessage('오류가 발생했습니다: ' + err.message);
    showToast('네트워크 오류가 발생했습니다.');
  });
}

// ========================
// CHAT UI
// ========================
function hideEmptyState() {
  var el = document.getElementById('emptyState');
  if (el) el.style.display = 'none';
}

function addUserMessage(text) {
  var now = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  var el = document.createElement('div');
  el.className = 'message user';
  el.innerHTML = '<div class="bubble">' + escHtml(text) + '</div><div class="message-time">' + now + '</div>';
  document.getElementById('chatArea').appendChild(el);
  scrollToBottom();
}

function addBotMessage(text) {
  var el = document.createElement('div');
  el.className = 'message bot';
  el.innerHTML = '<div class="bubble">' + escHtml(text) + '</div>';
  document.getElementById('chatArea').appendChild(el);
  scrollToBottom();
}

function addLoadingMessage() {
  var id = 'loading-' + Date.now();
  var el = document.createElement('div');
  el.className = 'message bot'; el.id = id;
  el.innerHTML = '<div class="loading-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  document.getElementById('chatArea').appendChild(el);
  scrollToBottom();
  return id;
}

function removeMessage(id) {
  var el = document.getElementById(id);
  if (el) el.remove();
}

function showCandidates(candidates) {
  var wrapper = document.createElement('div');
  wrapper.className = 'message bot';
  wrapper.style.cssText = 'max-width:100%;width:100%;';

  var inner = document.createElement('div');
  inner.className = 'candidates-wrapper';
  inner.innerHTML = '<div class="candidates-title">' + candidates.length + '곳을 찾았어요</div>';

  candidates.forEach(function(place) {
    var isFav = isFavorite(place.lat, place.lng);
    var card = document.createElement('div');
    card.className = 'candidate-card';
    card.dataset.lat = place.lat;
    card.dataset.lng = place.lng;
    card.dataset.name = place.name || '';
    card.dataset.address = place.address || '';
    card.dataset.category = place.category || '';

    card.innerHTML =
      '<div class="card-row1">' +
        '<div class="card-num">' + place.index + '</div>' +
        '<div class="card-info">' +
          '<div class="card-name">' + escHtml(place.name || '이름 없음') + '</div>' +
          '<div class="card-address">' + escHtml(place.address || '') + '</div>' +
        '</div>' +
      '</div>' +
      '<button class="card-star" onclick="toggleFavoriteFromCard(this)" title="즐겨찾기">' + (isFav ? '⭐' : '☆') + '</button>' +
      '<div class="card-row2">' +
        '<div class="card-tags">' +
          (place.category ? '<span class="card-category">' + escHtml(place.category) + '</span>' : '') +
          (place.distanceLabel ? '<span class="card-distance">' + place.distanceLabel + '</span>' : '') +
        '</div>' +
        '<button class="card-select-btn" onclick="navigateTo(' + place.lat + ',' + place.lng + ',\'' + escAttr(place.name || '') + '\')">길찾기 →</button>' +
      '</div>';
    inner.appendChild(card);
  });

  wrapper.appendChild(inner);
  document.getElementById('chatArea').appendChild(wrapper);
  scrollToBottom();
}

// ========================
// NAVIGATION DEEPLINK
// ========================
function navigateTo(dlat, dlng, dname, mode) {
  mode = mode || transportMode;
  var slat = currentLocation ? currentLocation.lat : '';
  var slng = currentLocation ? currentLocation.lng : '';
  var appname = 'com.example.mapservice';
  var enc = encodeURIComponent;

  var appUrl = mode === 'transit'
    ? 'nmap://route/public?slat=' + slat + '&slng=' + slng + '&sname=' + enc('현재위치') + '&dlat=' + dlat + '&dlng=' + dlng + '&dname=' + enc(dname) + '&appname=' + appname
    : 'nmap://route/car?slat=' + slat + '&slng=' + slng + '&sname=' + enc('현재위치') + '&dlat=' + dlat + '&dlng=' + dlng + '&dname=' + enc(dname) + '&appname=' + appname;

  var webUrl = mode === 'transit'
    ? 'https://map.naver.com/v5/directions/' + slng + ',' + slat + ',' + enc('현재위치') + ',15,map/' + dlng + ',' + dlat + ',' + enc(dname) + ',15,map/-/transit?c=15,0,0,0,dh'
    : 'https://map.naver.com/v5/directions/' + slng + ',' + slat + ',' + enc('현재위치') + ',15,map/' + dlng + ',' + dlat + ',' + enc(dname) + ',15,map/-/car?c=15,0,0,0,dh';

  var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (isMobile) {
    var timer = setTimeout(function() { window.open(webUrl, '_blank'); }, 1500);
    var iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = appUrl;
    document.body.appendChild(iframe);
    window.addEventListener('blur', function() { clearTimeout(timer); }, { once: true });
  } else {
    window.open(webUrl, '_blank');
  }

  addBotMessage('"' + dname + '" 길찾기를 시작합니다! (' + (mode === 'transit' ? '대중교통 🚇' : '자동차 🚗') + ')');
}

// ========================
// FAVORITES
// ========================
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('favorites') || '[]'); } catch(e) { return []; }
}

function saveFavorites(favs) {
  localStorage.setItem('favorites', JSON.stringify(favs));
  updateFavCount();
}

function isFavorite(lat, lng) {
  return getFavorites().some(function(f) { return Math.abs(f.lat - lat) < 0.0001 && Math.abs(f.lng - lng) < 0.0001; });
}

function toggleFavoriteFromCard(btn) {
  var card = btn.closest('.candidate-card');
  var lat = parseFloat(card.dataset.lat);
  var lng = parseFloat(card.dataset.lng);
  var name = card.dataset.name;
  var address = card.dataset.address;
  var category = card.dataset.category;

  var favs = getFavorites();
  var idx = favs.findIndex(function(f) { return Math.abs(f.lat - lat) < 0.0001 && Math.abs(f.lng - lng) < 0.0001; });
  if (idx >= 0) {
    favs.splice(idx, 1);
    btn.textContent = '☆';
    showToast('"' + name + '" 즐겨찾기에서 삭제했습니다.');
  } else {
    favs.unshift({ lat, lng, name, address, category, savedAt: Date.now() });
    btn.textContent = '⭐';
    showToast('"' + name + '" 즐겨찾기에 추가했습니다. ⭐');
  }
  saveFavorites(favs);
}

function removeFavorite(lat, lng) {
  var favs = getFavorites().filter(function(f) { return !(Math.abs(f.lat - lat) < 0.0001 && Math.abs(f.lng - lng) < 0.0001); });
  saveFavorites(favs);
  renderFavorites();
  showToast('즐겨찾기에서 삭제했습니다.');
}

function renderFavorites() {
  var panel = document.getElementById('favPanel');
  var favs = getFavorites();
  panel.innerHTML = '';

  if (favs.length === 0) {
    panel.innerHTML =
      '<div class="fav-empty">' +
        '<div class="fav-empty-icon">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' +
        '</div>' +
        '<p>즐겨찾기가 비어있어요.<br>검색 결과에서 ☆ 버튼을 눌러<br>자주 가는 곳을 저장하세요.</p>' +
      '</div>';
    return;
  }

  favs.forEach(function(f) {
    var item = document.createElement('div');
    item.className = 'fav-item';
    item.innerHTML =
      '<div class="fav-row1">' +
        '<div class="fav-pin">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>' +
        '</div>' +
        '<div class="fav-info">' +
          '<div class="fav-name">' + escHtml(f.name) + '</div>' +
          '<div class="fav-address">' + escHtml(f.address || '') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="fav-row2">' +
        '<button class="fav-transit-btn" onclick="navigateTo(' + f.lat + ',' + f.lng + ',\'' + escAttr(f.name) + '\',\'transit\')">🚇 대중교통</button>' +
        '<button class="fav-car-btn" onclick="navigateTo(' + f.lat + ',' + f.lng + ',\'' + escAttr(f.name) + '\',\'car\')">🚗 자동차</button>' +
        '<button class="fav-delete-btn" onclick="removeFavorite(' + f.lat + ',' + f.lng + ')">🗑</button>' +
      '</div>';
    panel.appendChild(item);
  });
}

function updateFavCount() {
  var count = getFavorites().length;
  document.getElementById('fav-count').textContent = count > 0 ? '(' + count + ')' : '';
}

// ========================
// CONFIG MODAL
// ========================
function openConfig() {
  document.getElementById('webhookInput').value = CONFIG.webhookUrl;
  document.getElementById('configModal').classList.add('open');
}
function closeConfig() {
  document.getElementById('configModal').classList.remove('open');
}
function saveConfig() {
  var url = document.getElementById('webhookInput').value.trim();
  CONFIG.webhookUrl = url;
  localStorage.setItem('webhookUrl', url);
  showToast(url ? 'Webhook URL이 저장되었습니다.' : 'Webhook URL을 삭제했습니다.');
  closeConfig();
}
document.getElementById('configModal').addEventListener('click', function(e) {
  if (e.target === this) closeConfig();
});

// ========================
// HELPERS
// ========================
function scrollToBottom() {
  var c = document.getElementById('chatArea');
  c.scrollTop = c.scrollHeight;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(str) {
  return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ========================
// IN-APP BROWSER DETECTION
// ========================
function detectInAppBrowser() {
  var ua = navigator.userAgent;
  var isKakao   = /KAKAOTALK/i.test(ua);
  var isNaver   = /NAVER/i.test(ua) && !/NaverBot/i.test(ua);
  var isInsta   = /Instagram/i.test(ua);
  var isFB      = /FBAN|FBAV/i.test(ua);
  var isLine    = /Line\//i.test(ua);
  var isSamsung = /SamsungBrowser/i.test(ua);
  var isInApp   = isKakao || isNaver || isInsta || isFB || isLine;

  if (!isInApp) return;

  var appName = isKakao ? '카카오톡' : isNaver ? '네이버' : isInsta ? '인스타그램' : isFB ? '페이스북' : 'Line';
  var banner = document.getElementById('inappBanner');
  document.getElementById('inappTitle').textContent = appName + ' 브라우저에서 열렸어요';
  document.getElementById('inappDesc').textContent = '음성 인식은 Chrome에서만 작동합니다. Chrome으로 열어주세요.';

  // Android: intent scheme으로 Chrome 직접 실행 가능
  var isAndroid = /Android/i.test(ua);
  var openBtn = document.getElementById('inappOpenBtn');
  if (isAndroid) {
    openBtn.style.display = '';
  } else {
    // iOS는 Chrome 강제 실행 불가 → 버튼 숨기고 링크 복사만 안내
    openBtn.style.display = 'none';
    document.getElementById('inappDesc').textContent = '음성 인식은 Safari 또는 Chrome에서 작동합니다. 링크를 복사해 다른 브라우저에서 열어주세요.';
  }

  banner.classList.add('show');
}

function openInChrome() {
  var url = location.href;
  // Android Chrome intent scheme
  location.href = 'intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
}

function copyPageUrl() {
  var url = location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function() {
      showToast('링크가 복사됐습니다. Chrome에 붙여넣기 해주세요.');
      document.getElementById('inappBanner').style.display = 'none';
    });
  } else {
    var el = document.createElement('textarea');
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('링크가 복사됐습니다. Chrome에 붙여넣기 해주세요.');
    document.getElementById('inappBanner').style.display = 'none';
  }
}

// ========================
// INIT
// ========================
detectInAppBrowser();
initLocation();
updateFavCount();
</script>
