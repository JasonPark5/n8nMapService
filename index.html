<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음성 길찾기 서비스</title>
  <style>
    :root {
      --primary: #03c75a;
      --primary-dark: #02a84a;
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --user-bubble: #03c75a;
      --bot-bubble: #ffffff;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }
    .header-icon {
      width: 36px; height: 36px;
      background: var(--primary);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; color: var(--text-muted); }

    /* Transport toggle */
    .transport-bar {
      background: var(--card-bg);
      padding: 10px 20px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .transport-btn {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid var(--border);
      border-radius: 20px;
      background: var(--card-bg);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .transport-btn.active {
      border-color: var(--primary);
      color: var(--primary);
      background: #f0fdf4;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      gap: 16px;
      color: var(--text-muted);
      flex: 1;
    }
    .empty-state .big-icon { font-size: 64px; }
    .empty-state h2 { font-size: 20px; font-weight: 700; color: var(--text); }
    .empty-state p { font-size: 14px; line-height: 1.6; }
    .example-chips {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px;
    }
    .chip {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover { border-color: var(--primary); color: var(--primary); }

    /* Message bubbles */
    .message { display: flex; flex-direction: column; max-width: 85%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: var(--bot-bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }
    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* Loading dots */
    .loading-bubble {
      background: var(--bot-bubble);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      box-shadow: var(--shadow);
      display: flex; gap: 4px; align-items: center;
    }
    .dot {
      width: 8px; height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Location candidate cards */
    .candidates-wrapper { width: 100%; max-width: 380px; }
    .candidates-title {
      font-size: 13px; font-weight: 600; color: var(--text-muted);
      margin-bottom: 8px; padding-left: 4px;
    }
    .candidate-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow);
    }
    .candidate-card:hover, .candidate-card:active {
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(3,199,90,0.2);
    }
    .card-header { display: flex; align-items: flex-start; gap: 10px; }
    .card-num {
      min-width: 24px; height: 24px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }
    .card-info { flex: 1; }
    .card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .card-address { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
    .card-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px;
    }
    .card-category {
      background: #f3f4f6;
      border-radius: 10px;
      padding: 3px 8px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .card-select-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .card-select-btn:hover { background: var(--primary-dark); }

    /* Input area */
    .input-area {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .mic-row {
      display: flex; align-items: center; justify-content: center; gap: 16px;
    }
    .mic-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 16px rgba(3,199,90,0.4);
      transition: all 0.2s;
      position: relative;
    }
    .mic-btn:hover { transform: scale(1.05); }
    .mic-btn.recording {
      background: #ef4444;
      box-shadow: 0 4px 16px rgba(239,68,68,0.4);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 4px 16px rgba(239,68,68,0.4); }
      50% { transform: scale(1.08); box-shadow: 0 4px 24px rgba(239,68,68,0.6); }
    }
    .mic-hint {
      font-size: 13px; color: var(--text-muted); text-align: center;
    }
    .mic-hint.recording { color: #ef4444; font-weight: 600; }

    /* Text input fallback */
    .text-input-row {
      display: flex; gap: 8px;
    }
    .text-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--primary); }
    .send-btn {
      width: 40px; height: 40px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .send-btn:hover { background: var(--primary-dark); }

    /* Config modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      width: 90%; max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 18px; margin-bottom: 16px; }
    .modal label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; color: var(--text-muted); }
    .modal input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    .modal input:focus { border-color: var(--primary); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-secondary {
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card-bg);
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary {
      padding: 10px 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .config-btn {
      position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: var(--text-muted);
    }

    /* Error toast */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: #1f2937;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 50;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* Location status */
    .location-status {
      font-size: 12px; color: var(--text-muted); text-align: center;
      padding: 4px 0;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .loc-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #d1d5db;
    }
    .loc-dot.ok { background: var(--primary); }
    .loc-dot.err { background: #ef4444; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header" style="position:relative;">
  <div class="header-icon">🗺️</div>
  <div>
    <h1>음성 길찾기</h1>
    <p>말하면 네이버지도로 안내해드려요</p>
  </div>
  <button class="config-btn" onclick="openConfig()" title="설정">⚙️</button>
</div>

<!-- Transport toggle -->
<div class="transport-bar">
  <button class="transport-btn active" id="btn-transit" onclick="setTransport('transit')">
    🚇 대중교통
  </button>
  <button class="transport-btn" id="btn-car" onclick="setTransport('car')">
    🚗 자동차
  </button>
</div>

<!-- Chat area -->
<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="big-icon">🎤</div>
    <h2>어디 가실 건가요?</h2>
    <p>마이크 버튼을 누르고<br>목적지를 말씀해 주세요</p>
    <div class="example-chips">
      <div class="chip" onclick="sendText('강남역 가는 길')">강남역 가는 길</div>
      <div class="chip" onclick="sendText('스타벅스 찾아줘')">스타벅스 찾아줘</div>
      <div class="chip" onclick="sendText('홍대입구역까지 가기')">홍대입구역까지 가기</div>
      <div class="chip" onclick="sendText('경복궁으로 가기')">경복궁으로 가기</div>
    </div>
  </div>
</div>

<!-- Input area -->
<div class="input-area">
  <div class="location-status">
    <div class="loc-dot" id="locDot"></div>
    <span id="locStatus">위치 정보 가져오는 중...</span>
  </div>
  <div class="mic-row">
    <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎤</button>
  </div>
  <div class="mic-hint" id="micHint">버튼을 누르고 말씀하세요</div>
  <div class="text-input-row">
    <input type="text" class="text-input" id="textInput" placeholder="직접 입력하기 (예: 강남역 가는 길)" />
    <button class="send-btn" onclick="sendTextFromInput()">➤</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Config modal -->
<div class="modal-overlay" id="configModal">
  <div class="modal">
    <h2>⚙️ 설정</h2>
    <label>n8n Webhook URL</label>
    <input type="url" id="webhookInput" placeholder="https://your-n8n.com/webhook/map-search" />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeConfig()">취소</button>
      <button class="btn-primary" onclick="saveConfig()">저장</button>
    </div>
  </div>
</div>

<script>
  // ========================
  // CONFIG
  // ========================
  const CONFIG = {
    // Set your n8n webhook URL here or via the settings button
    webhookUrl: localStorage.getItem('webhookUrl') || 'YOUR_N8N_WEBHOOK_URL_HERE',
  };

  let currentLocation = null;
  let transportMode = 'transit';
  let isRecording = false;
  let recognition = null;

  // ========================
  // GEOLOCATION
  // ========================
  function initLocation() {
    if (!navigator.geolocation) {
      setLocStatus('위치 서비스 미지원', 'err');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        setLocStatus('위치 확인됨 (' + currentLocation.lat.toFixed(4) + ', ' + currentLocation.lng.toFixed(4) + ')', 'ok');
      },
      err => {
        setLocStatus('위치 권한 없음 (기본값 사용)', 'err');
        // Seoul City Hall as fallback
        currentLocation = { lat: 37.5665, lng: 126.9780 };
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  function setLocStatus(msg, type) {
    document.getElementById('locStatus').textContent = msg;
    var dot = document.getElementById('locDot');
    dot.className = 'loc-dot' + (type ? ' ' + type : '');
  }

  // ========================
  // TRANSPORT MODE
  // ========================
  function setTransport(mode) {
    transportMode = mode;
    document.getElementById('btn-transit').classList.toggle('active', mode === 'transit');
    document.getElementById('btn-car').classList.toggle('active', mode === 'car');
  }

  // ========================
  // SPEECH RECOGNITION
  // ========================
  function toggleRecording() {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  }

  function startRecording() {
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      showToast('이 브라우저는 음성 인식을 지원하지 않습니다. 직접 입력해주세요.');
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'ko-KR';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = function() {
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '⏹';
      document.getElementById('micHint').textContent = '듣고 있어요... (다시 누르면 중지)';
      document.getElementById('micHint').classList.add('recording');
    };

    recognition.onresult = function(event) {
      var transcript = event.results[0][0].transcript;
      sendText(transcript);
    };

    recognition.onerror = function(event) {
      stopRecording();
      if (event.error === 'not-allowed') {
        showToast('마이크 권한을 허용해주세요.');
      } else if (event.error === 'no-speech') {
        showToast('음성이 감지되지 않았습니다. 다시 시도해주세요.');
      } else {
        showToast('음성 인식 오류: ' + event.error);
      }
    };

    recognition.onend = function() {
      stopRecording();
    };

    recognition.start();
  }

  function stopRecording() {
    isRecording = false;
    if (recognition) {
      try { recognition.stop(); } catch(e) {}
      recognition = null;
    }
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('micHint').textContent = '버튼을 누르고 말씀하세요';
    document.getElementById('micHint').classList.remove('recording');
  }

  // ========================
  // SEND TEXT
  // ========================
  function sendTextFromInput() {
    var input = document.getElementById('textInput');
    var text = input.value.trim();
    if (text) {
      input.value = '';
      sendText(text);
    }
  }

  document.getElementById('textInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendTextFromInput();
  });

  function sendText(text) {
    hideEmptyState();
    addUserMessage(text);

    if (!CONFIG.webhookUrl || CONFIG.webhookUrl === 'YOUR_N8N_WEBHOOK_URL_HERE') {
      showToast('설정 버튼을 눌러 n8n Webhook URL을 설정해주세요.');
      addBotMessage('설정이 필요합니다. 오른쪽 상단 ⚙️ 버튼을 눌러 n8n Webhook URL을 입력해주세요.');
      return;
    }

    var loadingId = addLoadingMessage();

    var payload = {
      text: text,
      lat: currentLocation ? currentLocation.lat : 37.5665,
      lng: currentLocation ? currentLocation.lng : 126.9780,
      transportMode: transportMode,
    };

    fetch(CONFIG.webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    .then(function(response) {
      if (!response.ok) throw new Error('서버 오류: ' + response.status);
      return response.json();
    })
    .then(function(data) {
      removeMessage(loadingId);

      if (!data || (Array.isArray(data) && data.length === 0)) {
        addBotMessage('검색 결과가 없습니다. 다른 목적지를 말씀해주세요.');
        return;
      }

      var candidates = Array.isArray(data) ? data : (data.candidates || data.results || [data]);
      if (candidates.length === 0) {
        addBotMessage('검색 결과가 없습니다. 다른 목적지를 말씀해주세요.');
        return;
      }

      showCandidates(candidates);
    })
    .catch(function(err) {
      removeMessage(loadingId);
      addBotMessage('오류가 발생했습니다: ' + err.message);
      showToast('네트워크 오류가 발생했습니다.');
      console.error(err);
    });
  }

  // ========================
  // CHAT UI
  // ========================
  function hideEmptyState() {
    var el = document.getElementById('emptyState');
    if (el) el.style.display = 'none';
  }

  function addUserMessage(text) {
    var chatArea = document.getElementById('chatArea');
    var now = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    var el = document.createElement('div');
    el.className = 'message user';
    el.innerHTML = '<div class="bubble">' + escHtml(text) + '</div><div class="message-time">' + now + '</div>';
    chatArea.appendChild(el);
    scrollToBottom();
  }

  function addBotMessage(text) {
    var chatArea = document.getElementById('chatArea');
    var el = document.createElement('div');
    el.className = 'message bot';
    el.innerHTML = '<div class="bubble">' + escHtml(text) + '</div>';
    chatArea.appendChild(el);
    scrollToBottom();
  }

  function addLoadingMessage() {
    var chatArea = document.getElementById('chatArea');
    var id = 'loading-' + Date.now();
    var el = document.createElement('div');
    el.className = 'message bot';
    el.id = id;
    el.innerHTML = '<div class="loading-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    chatArea.appendChild(el);
    scrollToBottom();
    return id;
  }

  function removeMessage(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
  }

  function showCandidates(candidates) {
    var chatArea = document.getElementById('chatArea');
    var wrapper = document.createElement('div');
    wrapper.className = 'message bot';
    wrapper.style.maxWidth = '100%';
    wrapper.style.width = '100%';

    var inner = document.createElement('div');
    inner.className = 'candidates-wrapper';
    inner.innerHTML = '<div class="candidates-title">📍 ' + candidates.length + '개의 장소를 찾았어요. 선택해주세요:</div>';

    candidates.forEach(function(place, i) {
      var card = document.createElement('div');
      card.className = 'candidate-card';
      card.innerHTML =
        '<div class="card-header">' +
          '<div class="card-num">' + (i + 1) + '</div>' +
          '<div class="card-info">' +
            '<div class="card-name">' + escHtml(place.name || '이름 없음') + '</div>' +
            '<div class="card-address">' + escHtml(place.address || place.roadAddress || '') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="card-meta">' +
          '<span class="card-category">' + escHtml(place.category || '') + '</span>' +
          '<button class="card-select-btn" onclick="navigateTo(' + place.lat + ', ' + place.lng + ', \'' + escAttr(place.name || '') + '\')">길찾기 →</button>' +
        '</div>';
      inner.appendChild(card);
    });

    wrapper.appendChild(inner);
    chatArea.appendChild(wrapper);
    scrollToBottom();
  }

  // ========================
  // NAVIGATION DEEPLINK
  // ========================
  function navigateTo(dlat, dlng, dname) {
    var slat = currentLocation ? currentLocation.lat : '';
    var slng = currentLocation ? currentLocation.lng : '';
    var sname = '현재위치';
    var appname = 'com.example.mapservice';
    var encodedName = encodeURIComponent(dname);
    var encodedSname = encodeURIComponent(sname);

    var naverAppUrl, webUrl;
    if (transportMode === 'transit') {
      naverAppUrl = 'nmap://route/public?slat=' + slat + '&slng=' + slng + '&sname=' + encodedSname + '&dlat=' + dlat + '&dlng=' + dlng + '&dname=' + encodedName + '&appname=' + appname;
      webUrl = 'https://map.naver.com/v5/directions/-/' + dlng + ',' + dlat + ',' + encodedName + ',-/transit?c=15,0,0,0,dh';
    } else {
      naverAppUrl = 'nmap://route/car?slat=' + slat + '&slng=' + slng + '&sname=' + encodedSname + '&dlat=' + dlat + '&dlng=' + dlng + '&dname=' + encodedName + '&appname=' + appname;
      webUrl = 'https://map.naver.com/v5/directions/-/' + dlng + ',' + dlat + ',' + encodedName + ',-/car?c=15,0,0,0,dh';
    }

    // Try app deeplink on mobile, fallback to web URL
    var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isMobile) {
      var fallbackTimer = setTimeout(function() {
        window.open(webUrl, '_blank');
      }, 1500);

      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = naverAppUrl;
      document.body.appendChild(iframe);

      window.addEventListener('blur', function() { clearTimeout(fallbackTimer); }, { once: true });
    } else {
      window.open(webUrl, '_blank');
    }

    addBotMessage('"' + dname + '" 길찾기를 시작합니다! (' + (transportMode === 'transit' ? '대중교통' : '자동차') + ')');
  }

  // ========================
  // CONFIG MODAL
  // ========================
  function openConfig() {
    document.getElementById('webhookInput').value = (CONFIG.webhookUrl !== 'YOUR_N8N_WEBHOOK_URL_HERE') ? CONFIG.webhookUrl : '';
    document.getElementById('configModal').classList.add('open');
  }

  function closeConfig() {
    document.getElementById('configModal').classList.remove('open');
  }

  function saveConfig() {
    var url = document.getElementById('webhookInput').value.trim();
    if (url) {
      CONFIG.webhookUrl = url;
      localStorage.setItem('webhookUrl', url);
      showToast('Webhook URL이 저장되었습니다.');
    }
    closeConfig();
  }

  document.getElementById('configModal').addEventListener('click', function(e) {
    if (e.target === document.getElementById('configModal')) closeConfig();
  });

  // ========================
  // HELPERS
  // ========================
  function scrollToBottom() {
    var chatArea = document.getElementById('chatArea');
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escAttr(str) {
    return String(str).replace(/'/g, "\\'").replace(/"/g, '\\"');
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  // ========================
  // INIT
  // ========================
  initLocation();
</script>
</body>
</html>
